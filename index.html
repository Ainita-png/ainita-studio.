<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiNiTA STUDIO 150</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; box-shadow: 0 0 15px #00ff41; }
        h2 { text-align: center; letter-spacing: 5px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; background: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 5px; }
        button:active { background: #00ff41; color: #000; }
        #status { margin-top: 15px; font-size: 0.8em; text-align: center; }
        audio { width: 100%; margin-top: 20px; filter: invert(1); }
        .style-tag { color: #888; font-size: 0.7em; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AiNiTA STUDIO</h2>
    <p class="style-tag">STYLE: AGGRESSIVE TRAP | 150 BPM | DARK PHONK</p>
    
    <input type="password" id="apiKey" placeholder="Unesi Hugging Face Token ovde...">
    <input type="text" id="prompt" placeholder="Opis pesme (npr. heavy 808 bass, gritty)...">
    
    <button onclick="generisi()">GENERISI MUZIKU (150 BPM)</button>
    
    <div id="status">Sistem spreman. Čekam komandu...</div>
    <audio id="player" controls></audio>
</div>

<script>
    async function generisi() {
        const key = document.getElementById('apiKey').value;
        const prompt = document.getElementById('prompt').value;
        const status = document.getElementById('status');
        const player = document.getElementById('player');

        if(!key) { alert("Moraš uneti Token!"); return; }

        status.innerText = "Slanje komande na server... Meljem zvuk...";
        
        try {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/musicgen-small",
                {
                    headers: { Authorization: `Bearer ${key}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: `150 BPM, Aggressive Serbian Trap, Dark Phonk, ${prompt}` }),
                }
            );

            if (!response.ok) throw new Error("Greška sa API serverom.");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            player.src = url;
            status.innerText = "GENERISANO. 6000 milja ispred svih.";
            player.play();
        } catch (err) {
            status.innerText = "GREŠKA: " + err.message;
        }
    }
</script>

</body>
</html>
