<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiNiTA STUDIO</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .box { border: 2px solid #0f0; padding: 20px; margin: 10px; border-radius: 10px; }
        input, button { width: 90%; padding: 12px; margin: 5px; border: 1px solid #0f0; background: #111; color: #0f0; }
        button { background: #0f0; color: #000; font-weight: bold; }
        #status { color: #ff0; margin: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>AiNiTA STUDIO</h3>
        <input type="password" id="k" placeholder="Token hf_...">
        <input type="text" id="p" placeholder="Stil (npr. dark phonk)">
        <button onclick="go()">GENERISI</button>
        <div id="status">Spreman.</div>
        <audio id="a" controls style="width:100%; margin-top:10px;"></audio>
    </div>

    <script>
        async function go() {
            const st = document.getElementById('status');
            const key = document.getElementById('k').value.trim();
            const pr = document.getElementById('p').value;
            const au = document.getElementById('a');

            if(!key) { st.innerText = "Fali Token!"; return; }
            st.innerText = "Povezivanje...";

            try {
                const r = await fetch("https://api-inference.huggingface.co/models/facebook/musicgen-small", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key },
                    body: JSON.stringify({ inputs: pr })
                });

                if (r.status === 503) {
                    st.innerText = "Model se budi... Klikni opet za 20s.";
                    return;
                }

                if (!r.ok) throw new Error("Greska: " + r.status);

                const b = await r.blob();
                au.src = URL.createObjectURL(b);
                st.innerText = "GENERISANO!";
                au.play();
            } catch (e) {
                st.innerText = "GRESKA: " + e.message;
            }
        }
    </script>
</body>
</html>
