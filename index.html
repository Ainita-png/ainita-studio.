<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiNiTA STUDIO</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 15px #00ff41; }
        input, button { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #00ff41; border-radius: 5px; background: #1a1a1a; color: #00ff41; font-weight: bold; }
        button { background: #00ff41; color: #000; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 20px; font-size: 0.9em; color: #ffcc00; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>AiNiTA STUDIO</h1>
    <p>SISTEM: 6000 MILJA</p>
    
    <input type="password" id="hfToken" placeholder="Nalepi Hugging Face Token (hf_...)">
    <input type="text" id="promptInput" placeholder="Stil (npr. aggressive trap, 150 bpm)">
    
    <button onclick="generateMusic()">GENERISI MUZIKU</button>
    
    <div id="status">Status: Sistem spreman.</div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    async function generateMusic() {
        const key = document.getElementById('hfToken').value.trim();
        const prompt = document.getElementById('promptInput').value;
        const status = document.getElementById('status');
        const player = document.getElementById('audioPlayer');

        if (!key) {
            status.innerText = "GREŠKA: Nedostaje Token!";
            return;
        }

        try {
            status.innerText = "Slanje komande... Može potrajati do 60s...";
            const response = await fetch(
                "https://api-inference.huggingface.co/models/facebook/musicgen-small",
                {
                    headers: { 
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    method: "POST",
                    body: JSON.stringify({ 
                        inputs: `150 BPM, Aggressive Serbian Trap, Dark Phonk, ${prompt}` 
                    }),
                }
            );

            if (response.status === 503) {
                status.innerText = "Model se učitava na server... Sačekaj 20s pa klikni opet.";
                return;
            }

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || "Status: " + response.status);
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            player.src = url;
            status.innerText = "GENERISANO! 6000 milja ispred svih.";
            player.play();
        } catch (err) {
            status.innerText = "GREŠKA: " + err.message;
            console.error(err);
        }
    }
</script>

</body>
</html>
